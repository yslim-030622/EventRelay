spring:
  application:
    name: eventrelay
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.eventrelay: INFO
    org.springframework.amqp: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  dedup-ttl-seconds: 86400
  discord-webhook-url: ${DISCORD_WEBHOOK_URL:}
  messaging:
    exchange-name: events.exchange
    github-queue-name: events.github
    generic-queue-name: events.generic
    payment-queue-name: events.payment
    dead-letter-queue-name: events.dead-letter

resilience4j:
  circuitbreaker:
    instances:
      githubConsumer:
        register-health-indicator: true
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      paymentConsumer:
        register-health-indicator: true
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      githubConsumerRetry:
        max-attempts: 3
        wait-duration: 2s
      paymentConsumerRetry:
        max-attempts: 3
        wait-duration: 2s
